app = "elib-backend"
primary_region = "ams" # Update this to your preferred region (e.g. jnb, cdg, lax, lhr)

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1 # Keep 1 warming instance active for zero startup lag
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
